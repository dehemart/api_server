services:
  postgres:
    image: postgres:16-alpine
    container_name: api_server_db_container
    restart: always
    environment:
      POSTGRES_USER: api_server_db_user
      POSTGRES_PASSWORD: api_server_db_password
      POSTGRES_DB: api_server_db
    ports:
      - "5432:5432"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    env_file:
      - ../../.env
volumes:
  pgdata:
    driver: local
